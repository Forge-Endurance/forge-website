<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Forge — You're invited</title>
<meta name="description" content="You've been invited to Forge — the endurance society. Meet people, find workouts, train together.">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400..900&display=swap" rel="stylesheet">
<style>
/* forgendurance.com/u/{id} — profile-link landing. Self-contained, matches the
   hero/waitlist aesthetic (dark green gradient, Inter, cream + green tokens). */
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
html { overflow-x: clip; }
body {
  font-family: "Inter", -apple-system, system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
  color: #F4F2ED;
  background: linear-gradient(168deg, #1C4530 0%, #123322 44%, #0B1F14 78%, #07140D 100%);
  min-height: 100svh;
  display: flex; align-items: center; justify-content: center;
  padding: 40px 24px;
  overflow-x: clip;
}
.grain {
  position: fixed; inset: 0; pointer-events: none; opacity: 0.5; z-index: 0;
  background: radial-gradient(90% 60% at 18% 8%, rgba(123,194,149,0.13), transparent 60%),
              radial-gradient(70% 50% at 90% 92%, rgba(0,0,0,0.5), transparent 65%);
}
.wrap { position: relative; z-index: 1; width: 100%; max-width: 440px; text-align: center; }

.mark { display: inline-flex; margin-bottom: 30px; }
.mark svg { width: 44px; height: 44px; }

h1 {
  margin: 0; font-size: clamp(31px, 8vw, 40px); line-height: 1.08;
  font-weight: 800; letter-spacing: -1.2px; color: #F4F2ED;
}
h1 .accent { color: #7BC295; }

.sub {
  margin: 16px auto 0; max-width: 360px;
  font-size: 16px; line-height: 1.55; color: rgba(237,236,234,0.68);
  text-wrap: pretty;
}

.cta {
  display: inline-flex; align-items: center; justify-content: center; gap: 9px;
  margin-top: 30px; height: 54px; padding: 0 28px; border-radius: 27px;
  background: #F4F2ED; color: #14301F; text-decoration: none;
  font-size: 15px; font-weight: 700; letter-spacing: -0.1px; white-space: nowrap;
  box-shadow: 0 10px 30px rgba(0,0,0,0.35);
  transition: transform 0.25s cubic-bezier(.16,1,.3,1), background 0.25s ease;
}
.cta:hover { background: #FFFFFF; transform: translateY(-1px); }
.cta:active { transform: scale(0.97); }

.alt { margin: 18px 0 0; font-size: 13px; color: rgba(237,236,234,0.5); }
.alt b { color: rgba(237,236,234,0.8); font-weight: 600; }
</style>
</head>
<body>
<div class="grain" aria-hidden="true"></div>

<main class="wrap">
  <span class="mark" aria-label="Forge">
    <svg viewBox="245 245 510 510" aria-hidden="true">
      <path d="M336 404L749 250L749 359L305 524Z" fill="#F4F2ED"></path>
      <path d="M295 575L638 451L576 542L250 749Z" fill="#F4F2ED"></path>
    </svg>
  </span>

  <h1>You've been invited to <span class="accent">Forge</span></h1>
  <p class="sub">The endurance society. Meet people, find workouts, train together.</p>

  <a class="cta" href="/waitlist/">
    Join the waitlist
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"></path></svg>
  </a>

  <p class="alt">Already have Forge? <b>Open the app.</b></p>
</main>
</body>
</html>
