<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Forge — Get access</title>
<meta name="description" content="Join the Forge waitlist.">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400..900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box}
[hidden]{display:none!important}   /* author display:flex on .fbox/.city-actions otherwise beats the UA [hidden] rule */
html,body{margin:0;padding:0}
body{font-family:"Inter",-apple-system,system-ui,sans-serif;background:linear-gradient(168deg,#1C4530 0%,#123322 44%,#0B1F14 78%,#07140D 100%);min-height:100svh;color:#F4F2ED;-webkit-font-smoothing:antialiased}
a{color:#9ED4B4;text-decoration:none}a:hover{color:#7BC295}
.shell{max-width:480px;margin:0 auto;padding:0 24px 44px;min-height:100svh;display:flex;flex-direction:column;position:relative}
.top{display:flex;align-items:center;justify-content:space-between;height:60px;padding-top:8px}
.back{display:flex;align-items:center;justify-content:center;width:38px;height:38px;border-radius:50%;background:rgba(244,242,237,.1)}
.back svg{width:16px;height:16px;stroke:#F4F2ED;stroke-width:2.4;fill:none;stroke-linecap:round;stroke-linejoin:round}
.brand{display:flex;align-items:center;gap:9px;color:#F4F2ED}
.brand span{font-size:18px;font-weight:800;letter-spacing:-.3px}
.spacer38{width:38px}
h1{margin:34px 0 0;font-size:38px;font-weight:800;letter-spacing:-1.4px;line-height:1.05}
.sub{margin:12px 0 0;font-size:15.5px;line-height:1.5;color:rgba(237,236,234,.65);max-width:320px;text-wrap:pretty}
.field{margin-top:20px}
.field label{display:block;font-size:12.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#9ED4B4;margin:0 2px 8px}
.fbox{display:flex;align-items:center;width:100%;height:56px;border-radius:28px;background:rgba(7,20,13,.55);border:1px solid rgba(123,194,149,.4);padding:0 22px;color:#F4F2ED;font-size:16px;font-family:inherit;outline:none;transition:border-color .25s ease}
.fbox:focus,.fbox:focus-within{border-color:rgba(123,194,149,.75)}
.fbox::placeholder{color:rgba(237,236,234,.4)}
button.fbox{cursor:pointer;justify-content:space-between;text-align:left}
button.fbox .ph{color:rgba(237,236,234,.4)}
button.fbox svg{width:14px;height:14px;stroke:rgba(237,236,234,.55);stroke-width:2.4;fill:none;stroke-linecap:round;stroke-linejoin:round;flex:none}
/* city step: one full-width pill — locate label (grows) + divider + round search button */
.city-actions{display:block}
.fbox.city-loc{display:flex;align-items:center;gap:13px;padding:0 7px 0 22px}
.loc-hit{flex:1;min-width:0;display:flex;align-items:center;gap:10px;height:100%;background:none;border:none;margin:0;padding:0;color:inherit;font:inherit;text-align:left;cursor:pointer}
.loc-hit .loc-ico{width:20px;height:20px;stroke:#7BC295;stroke-width:2.2;fill:none;stroke-linecap:round;stroke-linejoin:round;flex:none}
.loc-hit .loc-label{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.loc-hit .loc-spin{display:none;width:18px;height:18px;border-radius:50%;border:2px solid rgba(123,194,149,.3);border-top-color:#7BC295;animation:locspin .7s linear infinite;flex:none}
.loc-hit.is-locating{color:rgba(237,236,234,.6)}
.loc-hit.is-locating .loc-ico{display:none}
.loc-hit.is-locating .loc-spin{display:block}
.loc-hit:disabled{cursor:default}
@keyframes locspin{to{transform:rotate(360deg)}}
.city-div{width:1px;height:26px;background:rgba(255,255,255,.14);flex:none}
.city-search-btn{flex:none;display:flex;align-items:center;justify-content:center;width:48px;height:48px;padding:0;border-radius:24px;background:rgba(255,255,255,.08);border:none;color:#7BC295;cursor:pointer;transition:background .2s ease}
.city-search-btn:hover{background:rgba(255,255,255,.14)}
.city-search-btn svg{width:19px;height:19px;stroke:currentColor;stroke-width:2.2;fill:none;stroke-linecap:round;stroke-linejoin:round;flex:none}
.cs-label{display:none}
.city-loc.geo-off{padding:0 22px}
.city-loc.geo-off .city-search-btn{flex:1;width:auto;justify-content:flex-start;gap:12px;background:none;border-radius:0;padding:0;color:#F4F2ED}
.city-loc.geo-off .city-search-btn svg{stroke:#7BC295}
.city-loc.geo-off .cs-label{display:inline;font-size:16px}
.city-chosen .change{color:#9ED4B4;font-size:13.5px;font-weight:700;flex:none;margin-left:12px}
.loc-msg{margin:10px 2px 0;font-size:13.5px;line-height:1.4;color:#e8a598}
.submit{width:100%;height:58px;margin-top:30px;border-radius:29px;border:none;cursor:pointer;background:#F4F2ED;color:#14301F;font-family:inherit;font-size:16px;font-weight:800;display:flex;align-items:center;justify-content:center;gap:9px;box-shadow:0 6px 18px rgba(0,0,0,.3);transition:transform .25s cubic-bezier(.16,1,.3,1)}
.submit:active{transform:scale(.96)}
.submit svg{width:15px;height:15px;stroke:#14301F;stroke-width:2.8;fill:none;stroke-linecap:round;stroke-linejoin:round}
.submit[disabled]{opacity:.6}
.err{margin:10px 2px 0;font-size:13.5px;color:#e8a598;display:none}
/* city inline search + dark dropdown (replaces the bottom sheet) */
.city-search{position:relative}
.city-search .fbox{width:100%}
.city-dd{position:absolute;top:calc(100% + 6px);left:0;right:0;z-index:30;max-height:264px;overflow-y:auto;-webkit-overflow-scrolling:touch;background:rgba(9,20,14,.98);border:1px solid rgba(123,194,149,.4);border-radius:18px;box-shadow:0 18px 46px rgba(0,0,0,.5)}
.city-dd:empty{display:none}
.city-row{display:block;width:100%;text-align:left;background:none;border:none;border-bottom:1px solid rgba(244,242,237,.08);padding:13px 18px;font-family:inherit;font-size:15.5px;font-weight:500;color:#F4F2ED;cursor:pointer}
.city-row:last-child{border-bottom:none}
.city-row:hover,.city-row:active{background:rgba(123,194,149,.14)}
.city-row .use{color:#9ED4B4;font-weight:700}
.city-hint{padding:14px 18px;font-size:14px;color:rgba(237,236,234,.5)}
/* confirmation */
.done{display:none;flex:1;flex-direction:column;text-align:center;padding-top:9svh}
body.is-done .join-view{display:none}
body.is-done .done{display:flex}
.check-ring{width:72px;height:72px;border-radius:50%;background:rgba(123,194,149,.16);border:1.5px solid rgba(123,194,149,.5);display:flex;align-items:center;justify-content:center;margin:0 auto;animation:popIn .5s cubic-bezier(.16,1,.3,1) both}
.check-ring svg{width:32px;height:32px;stroke:#7BC295;stroke-width:2.6;fill:none;stroke-linecap:round;stroke-linejoin:round}
@keyframes popIn{from{opacity:0;transform:scale(.6)}to{opacity:1;transform:scale(1)}}
.done h2{margin:26px 0 0;font-size:36px;font-weight:800;letter-spacing:-1.2px;line-height:1.05}
.done h2 i{font-style:normal;color:#7BC295}
.done .sub{margin:12px auto 0}
.done .sub b{color:#9ED4B4;font-weight:700}
.done-actions{margin-top:40px;display:flex;flex-direction:column;gap:12px}
.ig-btn{display:flex;align-items:center;justify-content:center;height:54px;border-radius:27px;border:1px solid rgba(123,194,149,.4);color:#9ED4B4;font-size:15px;font-weight:700}
.ig-btn:hover{color:#9ED4B4;border-color:rgba(123,194,149,.7)}
.mark-bg{position:fixed;bottom:-30px;right:-150px;width:520px;height:520px;pointer-events:none;opacity:.16;z-index:-1}
</style>
</head>
<body>

<svg class="mark-bg" viewBox="245 245 510 510" aria-hidden="true"><defs><linearGradient id="mg" x1="0" y1="0" x2="0.6" y2="1"><stop offset="0" stop-color="#7BC295"></stop><stop offset="1" stop-color="#1E4D35"></stop></linearGradient></defs><path d="M336 404L749 250L749 359L305 524Z" fill="url(#mg)"></path><path d="M295 575L638 451L576 542L250 749Z" fill="url(#mg)"></path></svg>

<div class="shell">
  <div class="top">
    <a class="back" href="../index.html" aria-label="Back to home"><svg viewBox="0 0 24 24"><path d="M15 5l-7 7 7 7"></path></svg></a>
    <a class="brand" href="../index.html">
      <svg width="22" height="22" viewBox="245 245 510 510" aria-hidden="true"><path d="M336 404L749 250L749 359L305 524Z" fill="#F4F2ED"></path><path d="M295 575L638 451L576 542L250 749Z" fill="#F4F2ED"></path></svg>
      <span>Forge</span>
    </a>
    <span class="spacer38"></span>
  </div>

  <div class="join-view">
    <h1>Claim your spot.</h1>
    <p class="sub">Tell us where you train so we can match you with athletes nearby.</p>
    <form id="join-form" novalidate>
      <div class="field">
        <label for="f-name">First name</label>
        <input class="fbox" id="f-name" name="name" type="text" autocomplete="given-name" enterkeyhint="done" placeholder="Your first name">
      </div>
      <div class="field" id="city-field">
        <label>City</label>
        <div class="city-actions" id="city-actions">
          <div class="fbox city-loc" id="city-pill">
            <button class="loc-hit" id="loc-btn" type="button">
              <svg class="loc-ico" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 11L22 2L13 21L11 13Z"></path></svg>
              <span class="loc-spin" aria-hidden="true"></span>
              <span class="loc-label" id="loc-label">Use my current location</span>
            </button>
            <span class="city-div" aria-hidden="true"></span>
            <button class="city-search-btn" id="city-btn" type="button" aria-haspopup="dialog" aria-label="Search for your city">
              <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"></circle><path d="M20 20l-3.5-3.5"></path></svg>
              <span class="cs-label">Search your city</span>
            </button>
          </div>
        </div>
        <button class="fbox city-chosen" id="city-chosen" type="button" hidden>
          <span id="city-chosen-label"></span>
          <span class="change">Change</span>
        </button>
        <div class="city-search" id="city-search-wrap" hidden>
          <input class="fbox" id="city-search" type="text" enterkeyhint="search" placeholder="Search your city" autocomplete="off" autocapitalize="words">
          <div class="city-dd" id="citylist"></div>
        </div>
        <p class="loc-msg" id="loc-msg" hidden></p>
        <input type="hidden" id="f-city" name="city">
      </div>
      <div class="field">
        <label for="f-email">Email</label>
        <input class="fbox" id="f-email" name="email" type="email" inputmode="email" autocomplete="email" enterkeyhint="done" placeholder="you@email.com">
      </div>
      <p class="err" id="form-err"></p>
      <button class="submit" id="submit-btn" type="submit">Join the waitlist
        <svg viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"></path></svg>
      </button>
    </form>
  </div>

  <div class="done">
    <div class="check-ring"><svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"></path></svg></div>
    <h2>Welcome to<br>the society<i>.</i></h2>
    <p class="sub">You're on the list — we'll email you<br>the moment Forge opens in <b id="done-city">your city</b>.</p>
    <div class="done-actions">
      <a class="submit" style="margin-top:0" href="../index.html#discover">Explore Forge
        <svg viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"></path></svg>
      </a>
      <a class="ig-btn" href="https://www.instagram.com/forgendurance/?hl=en" target="_blank" rel="noopener">Instagram</a>
    </div>
  </div>
</div>

<script>
var CITIES = null, CITIES_LC = null;   // lazy-loaded from site/us-cities.json (population-ranked)
var citiesLoading = false, citiesFailed = false;
var $ = function(id){ return document.getElementById(id); };
var search=$('city-search'), list=$('citylist'), cityBtn=$('city-btn'), cityInput=$('f-city'), cityField=$('city-field'), searchWrap=$('city-search-wrap');

// comprehensive US city list — fetched once, only when the user first enters city search
// (or taps geolocation, which uses it to cross-check the reverse-geocode result)
function loadCities(){
  if(CITIES || citiesLoading){ return; }
  citiesLoading = true;
  fetch('../site/us-cities.json')
    .then(function(r){ if(!r.ok){ throw new Error(r.status); } return r.json(); })
    .then(function(data){
      CITIES = data;
      // normalized for matching: lowercase, drop commas, collapse spaces -> "hamburg ny"
      CITIES_LC = data.map(function(c){ return c.toLowerCase().replace(/,/g,'').replace(/\s+/g,' '); });
      citiesLoading = false;
      renderList(search.value);
    })
    .catch(function(){ citiesLoading = false; citiesFailed = true; renderList(search.value); });
}

// city row states: 'pill' (two-action) | 'chosen' (City, ST + Change) | 'search' (inline input + dropdown)
function showState(which){
  cityActions.hidden = which!=='pill';
  cityChosen.hidden  = which!=='chosen';
  searchWrap.hidden  = which!=='search';
}
function enterSearch(){
  loadCities();                        // lazy: first entry into search state
  showState('search');
  search.value=''; renderList('');
  // iOS Safari: focus synchronously inside the tap gesture so the keyboard opens.
  try { search.focus({ preventScroll: true }); } catch(e){ search.focus(); }
  document.addEventListener('pointerdown', outsideClose, true);
}
function exitSearch(){
  document.removeEventListener('pointerdown', outsideClose, true);
  search.value=''; renderList('');
  showState(cityInput.value ? 'chosen' : 'pill');   // never clears an existing city
}
function outsideClose(e){ if(!cityField.contains(e.target)){ exitSearch(); } }
// tapping the round search button (or "Change") enters inline search
cityBtn.addEventListener('click', enterSearch);
// don't let Enter inside the inline input submit the form
search.addEventListener('keydown', function(e){ if(e.key==='Enter'){ e.preventDefault(); } });

// first name → complete the field (return/done key, or a space typed after at least
// one character). This dismisses the keyboard so the viewport settles back to the full
// page; it does NOT open the city sheet — the user taps the City field for that.
var nameEl=$('f-name');
function completeName(){ nameEl.value=nameEl.value.trim(); if(!nameEl.value){ return; } nameEl.blur(); }
nameEl.addEventListener('keydown', function(e){
  if(e.key==='Enter'){ e.preventDefault(); completeName(); }
  else if(e.key===' ' && nameEl.value.trim().length>0){ e.preventDefault(); completeName(); }
});
// ── chosen-city display + the two ways to set it (search sheet OR geolocation) ──
var cityActions=$('city-actions'), cityChosen=$('city-chosen'), chosenLabel=$('city-chosen-label');
function setCity(city){
  cityInput.value = city;
  chosenLabel.textContent = city;
  hideLocMsg();
  showState('chosen');
}
function pick(city){   // tapped a dropdown row
  document.removeEventListener('pointerdown', outsideClose, true);
  setCity(city);
  search.value=''; renderList('');
  if(document.activeElement && document.activeElement.blur){ document.activeElement.blur(); }  // dismiss keyboard
  window.scrollTo(0,0); requestAnimationFrame(function(){ window.scrollTo(0,0); });             // settle view
}
// tap "Change" → re-enter inline search; the existing city stays set unless a new row is
// picked (dismissing without picking leaves it intact).
cityChosen.addEventListener('click', enterSearch);

// ── "Use my current location" → geolocation → BigDataCloud reverse-geocode → "City, ST" ──
var locBtn=$('loc-btn'), locLabel=$('loc-label'), locMsg=$('loc-msg'), locating=false;
function showLocMsg(t){ locMsg.textContent=t; locMsg.hidden=false; }
function hideLocMsg(){ locMsg.hidden=true; locMsg.textContent=''; }
function setLocating(on){ locating=on; locBtn.classList.toggle('is-locating', on); locBtn.disabled=on; locLabel.textContent = on ? 'Locating…' : 'Use my current location'; }
function geoAvailable(){ return ('geolocation' in navigator) && (location.protocol==='https:' || location.hostname==='localhost' || location.hostname==='127.0.0.1'); }

// full state/territory name → USPS abbreviation
var STATE_ABBR={ "Alabama":"AL","Alaska":"AK","Arizona":"AZ","Arkansas":"AR","California":"CA","Colorado":"CO","Connecticut":"CT","Delaware":"DE","District of Columbia":"DC","Florida":"FL","Georgia":"GA","Hawaii":"HI","Idaho":"ID","Illinois":"IL","Indiana":"IN","Iowa":"IA","Kansas":"KS","Kentucky":"KY","Louisiana":"LA","Maine":"ME","Maryland":"MD","Massachusetts":"MA","Michigan":"MI","Minnesota":"MN","Mississippi":"MS","Missouri":"MO","Montana":"MT","Nebraska":"NE","Nevada":"NV","New Hampshire":"NH","New Jersey":"NJ","New Mexico":"NM","New York":"NY","North Carolina":"NC","North Dakota":"ND","Ohio":"OH","Oklahoma":"OK","Oregon":"OR","Pennsylvania":"PA","Rhode Island":"RI","South Carolina":"SC","South Dakota":"SD","Tennessee":"TN","Texas":"TX","Utah":"UT","Vermont":"VT","Virginia":"VA","Washington":"WA","West Virginia":"WV","Wisconsin":"WI","Wyoming":"WY","Puerto Rico":"PR","Guam":"GU","U.S. Virgin Islands":"VI","American Samoa":"AS","Northern Mariana Islands":"MP" };

function normKey(s){ return (s||'').toLowerCase().replace(/,/g,'').replace(/\s+/g,' ').trim(); }
// find a verbatim dataset entry for a "name, ST" (population-ranked list, normalized compare)
function datasetLookup(name, st){
  if(!CITIES){ return null; }
  var key = normKey(name + ' ' + st);
  for(var i=0;i<CITIES_LC.length;i++){ if(CITIES_LC[i]===key){ return CITIES[i]; } }
  return null;
}
function stateOf(data){
  var st = STATE_ABBR[data.principalSubdivision || ''] || '';
  if(!st && data.principalSubdivisionCode){ var m=/-([A-Z]{2})$/.exec(data.principalSubdivisionCode); if(m){ st=m[1]; } }
  return st;
}
// is `name` a sub-city division (NYC borough, neighborhood…)? — read its localityInfo description
function isSubCity(name, data){
  if(!name || !data.localityInfo){ return false; }
  var all = (data.localityInfo.administrative||[]).concat(data.localityInfo.informative||[]);
  for(var i=0;i<all.length;i++){
    if(all[i].name && all[i].name.toLowerCase()===name.toLowerCase()){
      var d = (all[i].description||'').toLowerCase();
      if(/\b(borough|neighbou?rhood|quarter|ward|suburb)\b/.test(d) || /section of\b/.test(d) || /district of\b/.test(d)){ return true; }
    }
  }
  return false;
}
// Prefer the precise locality over the coarse (metro) city field — BigDataCloud's `city`
// returns the nearest metro (Ellicott City → "Baltimore"), while `locality` is the actual
// place ("Ellicott City"). Guard against over-precise sub-city values (Manhattan → borough)
// by falling back to the coarser city. Cross-check our dataset for a verbatim, search-matching string.
function toCityST(data){
  if(!data){ return ''; }
  var st = stateOf(data);
  var precise = data.locality || '';
  var coarse  = data.city || '';
  if(precise && isSubCity(precise, data)){ precise = ''; }   // borough/neighborhood → use the coarser city
  if(!st){ return precise || coarse || ''; }                 // no state (rare) — best effort
  if(precise){
    return datasetLookup(precise, st) || (precise + ', ' + st);   // in dataset → verbatim; else precise free value
  }
  if(coarse){
    return datasetLookup(coarse, st) || (coarse + ', ' + st);
  }
  return '';
}

if(!geoAvailable()){
  // non-secure / unsupported: collapse the pill to a search-only field
  locBtn.hidden = true;
  document.querySelector('.city-div').hidden = true;
  document.getElementById('city-pill').classList.add('geo-off');
}

locBtn.addEventListener('click', function(){
  if(locating){ return; }
  hideLocMsg();
  loadCities();          // so toCityST() can cross-check the geocode result against our list
  setLocating(true);
  var done=false, master;
  function fail(msg){ if(done){ return; } done=true; clearTimeout(master); setLocating(false); showLocMsg(msg); }
  master=setTimeout(function(){ fail('Couldn’t get your location — try Search instead.'); }, 8000);
  navigator.geolocation.getCurrentPosition(function(pos){
    if(done){ return; }
    fetch('https://api.bigdatacloud.net/data/reverse-geocode-client?latitude='+pos.coords.latitude+'&longitude='+pos.coords.longitude+'&localityLanguage=en')
      .then(function(r){ if(!r.ok){ throw new Error(r.status); } return r.json(); })
      .then(function(data){
        if(done){ return; }
        var cs=toCityST(data);
        if(!cs){ fail('Couldn’t find your city — try Search instead.'); return; }
        done=true; clearTimeout(master); setLocating(false); setCity(cs);
        if(document.activeElement && document.activeElement.blur){ document.activeElement.blur(); }
      })
      .catch(function(){ fail('Couldn’t get your location — try Search instead.'); });
  }, function(err){
    fail(err && err.code===1 ? 'Location access needed — try Search instead.' : 'Couldn’t get your location — try Search instead.');
  }, { enableHighAccuracy:false, timeout:8000, maximumAge:600000 });
});
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function useRow(raw){ return '<button type="button" class="city-row" data-city="'+esc(raw)+'"><span class="use">Use \u201C'+esc(raw)+'\u201D</span></button>'; }

function renderList(q){
  var raw=(q||'').trim();
  if(!raw){ list.innerHTML=''; return; }   /* empty query -> dropdown hides via .city-dd:empty */
  var qq=raw.toLowerCase().replace(/,/g,'').replace(/\s+/g,' ');
  if(!CITIES){
    // dataset still loading (or failed to load) — keep the "Use ..." escape hatch available
    var note = citiesFailed ? 'Type your city and tap \u201CUse \u2026\u201D.' : 'Loading cities\u2026';
    list.innerHTML = '<p class="city-hint">'+note+'</p>' + (raw.length>2 ? useRow(raw) : '');
    return;
  }
  // collect in DATASET ORDER (population-ranked) — no alphabetical re-sort. two buckets:
  // prefix matches rank above substring matches, each preserving dataset order.
  var starts=[], contains=[];
  for(var i=0;i<CITIES_LC.length;i++){
    var idx=CITIES_LC[i].indexOf(qq);
    if(idx===0){ starts.push(CITIES[i]); }
    else if(idx>0){ contains.push(CITIES[i]); }
    if(starts.length>=8){ break; }
  }
  var matches=starts.concat(contains).slice(0,8);
  var html='';
  for(var j=0;j<matches.length;j++){ html+='<button type="button" class="city-row" data-city="'+esc(matches[j])+'">'+esc(matches[j])+'</button>'; }
  var exact=matches.some(function(m){ return m.toLowerCase()===raw.toLowerCase(); });
  if(raw.length>2 && !exact){ html+=useRow(raw); }
  list.innerHTML = html;
}

var searchTimer=null;
search.addEventListener('input', function(){ clearTimeout(searchTimer); searchTimer=setTimeout(function(){ renderList(search.value); }, 140); });
list.addEventListener('click', function(e){ var b=e.target.closest('.city-row'); if(b){ pick(b.getAttribute('data-city')); } });

var form=$('join-form'), errEl=$('form-err'), btn=$('submit-btn');
form.addEventListener('submit', function(e){
  e.preventDefault();
  // dismiss the keyboard (Enter on email or the submit tap both land here) so the
  // squeezed viewport is released before we switch to the confirmation view.
  if(document.activeElement && document.activeElement.blur){ document.activeElement.blur(); }
  var name=$('f-name').value.trim(), city=cityInput.value.trim(), email=$('f-email').value.trim();
  var msg='';
  if(!name){ msg='Please enter your first name.'; }
  else if(!city){ msg='Please select your city.'; }
  else if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ msg='Please enter a valid email.'; }
  if(msg){ errEl.textContent=msg; errEl.style.display='block'; return; }
  errEl.style.display='none'; btn.disabled=true;
  var body=new URLSearchParams({ 'form-name':'waitlist', email:email, name:name, city:city, source:'join' }).toString();
  fetch('/', { method:'POST', headers:{ 'Content-Type':'application/x-www-form-urlencoded' }, body:body })
    .then(function(r){ if(!r.ok){ throw new Error(r.status); } finish(city); })
    .catch(function(){
      if(location.protocol==='file:' || location.hostname==='localhost' || location.hostname.indexOf('forgendurance')===-1 && location.hostname.indexOf('netlify')===-1){ finish(city); }
      else { btn.disabled=false; errEl.textContent='Something went wrong — please try again.'; errEl.style.display='block'; }
    });
});
// email: space AND the done/return key only dismiss the keyboard and settle the view —
// neither submits. Submission happens solely via the "Join the waitlist" button tap.
$('f-email').addEventListener('keydown', function(e){
  if(e.key!==' ' && e.key!=='Enter'){ return; }
  e.preventDefault();                  // never insert a space; never fire the implicit form submit on Enter
  this.blur();                         // dismiss keyboard
  window.scrollTo(0,0);                // settle the view back to the normal zoomed-out state
  requestAnimationFrame(function(){ window.scrollTo(0,0); });
});
function finish(city){
  $('done-city').textContent=city.split(',')[0];
  document.body.classList.add('is-done');
  window.scrollTo(0,0);
  // settle once more after the keyboard dismissal / layout release
  requestAnimationFrame(function(){ window.scrollTo(0,0); });
}
</script>
</body>
</html>
