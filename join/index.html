<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Forge — Get access</title>
<meta name="description" content="Join the Forge waitlist.">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400..900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:"Inter",-apple-system,system-ui,sans-serif;background:linear-gradient(168deg,#1C4530 0%,#123322 44%,#0B1F14 78%,#07140D 100%);min-height:100svh;color:#F4F2ED;-webkit-font-smoothing:antialiased}
a{color:#9ED4B4;text-decoration:none}a:hover{color:#7BC295}
.shell{max-width:480px;margin:0 auto;padding:0 24px 44px;min-height:100svh;display:flex;flex-direction:column;position:relative}
.top{display:flex;align-items:center;justify-content:space-between;height:60px;padding-top:8px}
.back{display:flex;align-items:center;justify-content:center;width:38px;height:38px;border-radius:50%;background:rgba(244,242,237,.1)}
.back svg{width:16px;height:16px;stroke:#F4F2ED;stroke-width:2.4;fill:none;stroke-linecap:round;stroke-linejoin:round}
.brand{display:flex;align-items:center;gap:9px;color:#F4F2ED}
.brand span{font-size:18px;font-weight:800;letter-spacing:-.3px}
.spacer38{width:38px}
h1{margin:34px 0 0;font-size:38px;font-weight:800;letter-spacing:-1.4px;line-height:1.05}
.sub{margin:12px 0 0;font-size:15.5px;line-height:1.5;color:rgba(237,236,234,.65);max-width:320px;text-wrap:pretty}
.field{margin-top:20px}
.field label{display:block;font-size:12.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#9ED4B4;margin:0 2px 8px}
.fbox{display:flex;align-items:center;width:100%;height:56px;border-radius:28px;background:rgba(7,20,13,.55);border:1px solid rgba(123,194,149,.4);padding:0 22px;color:#F4F2ED;font-size:16px;font-family:inherit;outline:none;transition:border-color .25s ease}
.fbox:focus,.fbox:focus-within{border-color:rgba(123,194,149,.75)}
.fbox::placeholder{color:rgba(237,236,234,.4)}
button.fbox{cursor:pointer;justify-content:space-between;text-align:left}
button.fbox .ph{color:rgba(237,236,234,.4)}
button.fbox svg{width:14px;height:14px;stroke:rgba(237,236,234,.55);stroke-width:2.4;fill:none;stroke-linecap:round;stroke-linejoin:round;flex:none}
.submit{width:100%;height:58px;margin-top:30px;border-radius:29px;border:none;cursor:pointer;background:#F4F2ED;color:#14301F;font-family:inherit;font-size:16px;font-weight:800;display:flex;align-items:center;justify-content:center;gap:9px;box-shadow:0 6px 18px rgba(0,0,0,.3);transition:transform .25s cubic-bezier(.16,1,.3,1)}
.submit:active{transform:scale(.96)}
.submit svg{width:15px;height:15px;stroke:#14301F;stroke-width:2.8;fill:none;stroke-linecap:round;stroke-linejoin:round}
.submit[disabled]{opacity:.6}
.privacy{margin:14px 0 0;text-align:center;font-size:12.5px;color:rgba(237,236,234,.45)}
.err{margin:10px 2px 0;font-size:13.5px;color:#e8a598;display:none}
/* city sheet */
.scrim{position:fixed;inset:0;background:rgba(4,10,7,.6);opacity:0;pointer-events:none;transition:opacity .3s ease;z-index:40}
.sheet{position:fixed;left:0;right:0;bottom:0;top:18svh;background:#F4F2ED;border-radius:28px 28px 0 0;z-index:50;padding:18px 24px 24px;box-shadow:0 -20px 60px rgba(0,0,0,.45);transform:translateY(105%);transition:transform .4s cubic-bezier(.16,1,.3,1);display:flex;flex-direction:column}
.sheet .inner-shell{max-width:432px;margin:0 auto;width:100%;display:flex;flex-direction:column;min-height:0;flex:1}
body.sheet-open .scrim{opacity:1;pointer-events:auto}
body.sheet-open .sheet{transform:none}
.grab{width:44px;height:5px;border-radius:3px;background:#d5d2c8;margin:0 auto 14px;flex:none}
.search{display:flex;align-items:center;gap:10px;height:48px;border-radius:24px;background:#e9e6de;padding:0 18px;flex:none}
.search svg{width:16px;height:16px;stroke:#8a8880;stroke-width:2.2;fill:none;stroke-linecap:round;flex:none}
.search input{flex:1;min-width:0;border:none;background:none;font-family:inherit;font-size:16px;color:#1A1814;outline:none}
.search input::placeholder{color:#9a978e}
.citylist{margin-top:8px;overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch}
.city-row{display:flex;align-items:center;width:100%;background:none;border:none;cursor:pointer;font-family:inherit;text-align:left;padding:15px 4px;border-bottom:1px solid #e4e1d8;font-size:16px;font-weight:600;color:#1A1814}
.city-row:active{background:#ece9e1}
.city-row .use{color:#1E4D35}
.city-hint{padding:16px 4px;font-size:14px;color:#9a978e}
/* confirmation */
.done{display:none;flex:1;flex-direction:column;text-align:center;padding-top:9svh}
body.is-done .join-view{display:none}
body.is-done .done{display:flex}
.check-ring{width:72px;height:72px;border-radius:50%;background:rgba(123,194,149,.16);border:1.5px solid rgba(123,194,149,.5);display:flex;align-items:center;justify-content:center;margin:0 auto;animation:popIn .5s cubic-bezier(.16,1,.3,1) both}
.check-ring svg{width:32px;height:32px;stroke:#7BC295;stroke-width:2.6;fill:none;stroke-linecap:round;stroke-linejoin:round}
@keyframes popIn{from{opacity:0;transform:scale(.6)}to{opacity:1;transform:scale(1)}}
.done h2{margin:26px 0 0;font-size:36px;font-weight:800;letter-spacing:-1.2px;line-height:1.05}
.done h2 i{font-style:normal;color:#7BC295}
.done .sub{margin:12px auto 0}
.done .sub b{color:#9ED4B4;font-weight:700}
.done-actions{margin-top:40px;display:flex;flex-direction:column;gap:12px}
.ig-btn{display:flex;align-items:center;justify-content:center;height:54px;border-radius:27px;border:1px solid rgba(123,194,149,.4);color:#9ED4B4;font-size:15px;font-weight:700}
.ig-btn:hover{color:#9ED4B4;border-color:rgba(123,194,149,.7)}
.mark-bg{position:fixed;bottom:-30px;right:-150px;width:520px;height:520px;pointer-events:none;opacity:.16;z-index:-1}
</style>
</head>
<body>

<svg class="mark-bg" viewBox="245 245 510 510" aria-hidden="true"><defs><linearGradient id="mg" x1="0" y1="0" x2="0.6" y2="1"><stop offset="0" stop-color="#7BC295"></stop><stop offset="1" stop-color="#1E4D35"></stop></linearGradient></defs><path d="M336 404L749 250L749 359L305 524Z" fill="url(#mg)"></path><path d="M295 575L638 451L576 542L250 749Z" fill="url(#mg)"></path></svg>

<div class="shell">
  <div class="top">
    <a class="back" href="../index.html" aria-label="Back to home"><svg viewBox="0 0 24 24"><path d="M15 5l-7 7 7 7"></path></svg></a>
    <a class="brand" href="../index.html">
      <svg width="22" height="22" viewBox="245 245 510 510" aria-hidden="true"><path d="M336 404L749 250L749 359L305 524Z" fill="#F4F2ED"></path><path d="M295 575L638 451L576 542L250 749Z" fill="#F4F2ED"></path></svg>
      <span>Forge</span>
    </a>
    <span class="spacer38"></span>
  </div>

  <div class="join-view">
    <h1>Claim your spot.</h1>
    <p class="sub">Tell us where you train so we can match you with athletes nearby.</p>
    <form id="join-form" novalidate>
      <div class="field">
        <label for="f-name">First name</label>
        <input class="fbox" id="f-name" name="name" type="text" autocomplete="given-name" placeholder="Your first name">
      </div>
      <div class="field">
        <label>City</label>
        <button class="fbox" id="city-btn" type="button" aria-haspopup="dialog"><span class="ph" id="city-label">Select your city</span><svg viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"></path></svg></button>
        <input type="hidden" id="f-city" name="city">
      </div>
      <div class="field">
        <label for="f-email">Email</label>
        <input class="fbox" id="f-email" name="email" type="email" inputmode="email" autocomplete="email" placeholder="you@email.com">
      </div>
      <p class="err" id="form-err"></p>
      <button class="submit" id="submit-btn" type="submit">Join the waitlist
        <svg viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"></path></svg>
      </button>
      <p class="privacy">No spam — one email when your city opens.</p>
    </form>
  </div>

  <div class="done">
    <div class="check-ring"><svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"></path></svg></div>
    <h2>Welcome to<br>the society<i>.</i></h2>
    <p class="sub">You're on the list — we'll email you<br>the moment Forge opens in <b id="done-city">your city</b>.</p>
    <div class="done-actions">
      <a class="submit" style="margin-top:0" href="../index.html#discover">Explore Forge
        <svg viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"></path></svg>
      </a>
      <a class="ig-btn" href="https://www.instagram.com/forgendurance/?hl=en" target="_blank" rel="noopener">Instagram</a>
    </div>
  </div>
</div>

<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet" role="dialog" aria-label="Choose your city">
  <div class="inner-shell">
    <div class="grab"></div>
    <div class="search">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"></circle><path d="M20 20l-3.5-3.5"></path></svg>
      <input id="city-search" type="text" placeholder="Search your city" autocomplete="off" autocapitalize="words">
    </div>
    <div class="citylist" id="citylist"><p class="city-hint">Start typing to find your city.</p></div>
  </div>
</div>

<script>
var CITIES = null, CITIES_LC = null;   // lazy-loaded from site/us-cities.json when the sheet opens
var citiesLoading = false, citiesFailed = false;
var $ = function(id){ return document.getElementById(id); };
var sheet=$('sheet'), scrim=$('scrim'), search=$('city-search'), list=$('citylist'), cityBtn=$('city-btn'), cityLabel=$('city-label'), cityInput=$('f-city');

// comprehensive US city list — fetched once, only when the sheet is first opened
function loadCities(){
  if(CITIES || citiesLoading){ return; }
  citiesLoading = true;
  fetch('../site/us-cities.json')
    .then(function(r){ if(!r.ok){ throw new Error(r.status); } return r.json(); })
    .then(function(data){
      CITIES = data;
      // normalized for matching: lowercase, drop commas, collapse spaces -> "hamburg ny"
      CITIES_LC = data.map(function(c){ return c.toLowerCase().replace(/,/g,'').replace(/\s+/g,' '); });
      citiesLoading = false;
      renderList(search.value);
    })
    .catch(function(){ citiesLoading = false; citiesFailed = true; renderList(search.value); });
}

function openSheet(){ loadCities(); document.body.classList.add('sheet-open'); setTimeout(function(){ search.focus(); },350); }
function closeSheet(){ document.body.classList.remove('sheet-open'); search.value=''; renderList(''); }
cityBtn.addEventListener('click', openSheet);
scrim.addEventListener('click', closeSheet);
function pick(city){ cityInput.value=city; cityLabel.textContent=city; cityLabel.classList.remove('ph'); closeSheet(); }
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function useRow(raw){ return '<button type="button" class="city-row" data-city="'+esc(raw)+'"><span class="use">Use \u201C'+esc(raw)+'\u201D</span></button>'; }

function renderList(q){
  var raw=(q||'').trim();
  if(!raw){ list.innerHTML='<p class="city-hint">Start typing to find your city.</p>'; return; }
  var qq=raw.toLowerCase().replace(/,/g,'').replace(/\s+/g,' ');
  if(!CITIES){
    // dataset still loading (or failed to load) — keep the "Use ..." escape hatch available
    var note = citiesFailed ? 'Type your city and tap \u201CUse \u2026\u201D.' : 'Loading cities\u2026';
    list.innerHTML = '<p class="city-hint">'+note+'</p>' + (raw.length>2 ? useRow(raw) : '');
    return;
  }
  var starts=[], contains=[];
  for(var i=0;i<CITIES_LC.length;i++){
    var idx=CITIES_LC[i].indexOf(qq);
    if(idx===0){ starts.push(CITIES[i]); }
    else if(idx>0){ contains.push(CITIES[i]); }
    if(starts.length>=30){ break; }
  }
  var matches=starts.concat(contains).slice(0,30);
  var html='';
  for(var j=0;j<matches.length;j++){ html+='<button type="button" class="city-row" data-city="'+esc(matches[j])+'">'+esc(matches[j])+'</button>'; }
  var exact=matches.some(function(m){ return m.toLowerCase()===raw.toLowerCase(); });
  if(raw.length>2 && !exact){ html+=useRow(raw); }
  list.innerHTML = html || useRow(raw);
}

var searchTimer=null;
search.addEventListener('input', function(){ clearTimeout(searchTimer); searchTimer=setTimeout(function(){ renderList(search.value); }, 140); });
list.addEventListener('click', function(e){ var b=e.target.closest('.city-row'); if(b){ pick(b.getAttribute('data-city')); } });

var form=$('join-form'), errEl=$('form-err'), btn=$('submit-btn');
form.addEventListener('submit', function(e){
  e.preventDefault();
  var name=$('f-name').value.trim(), city=cityInput.value.trim(), email=$('f-email').value.trim();
  var msg='';
  if(!name){ msg='Please enter your first name.'; }
  else if(!city){ msg='Please select your city.'; }
  else if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ msg='Please enter a valid email.'; }
  if(msg){ errEl.textContent=msg; errEl.style.display='block'; return; }
  errEl.style.display='none'; btn.disabled=true;
  var body=new URLSearchParams({ 'form-name':'waitlist', email:email, name:name, city:city, source:'join' }).toString();
  fetch('/', { method:'POST', headers:{ 'Content-Type':'application/x-www-form-urlencoded' }, body:body })
    .then(function(r){ if(!r.ok){ throw new Error(r.status); } finish(city); })
    .catch(function(){
      if(location.protocol==='file:' || location.hostname==='localhost' || location.hostname.indexOf('forgendurance')===-1 && location.hostname.indexOf('netlify')===-1){ finish(city); }
      else { btn.disabled=false; errEl.textContent='Something went wrong — please try again.'; errEl.style.display='block'; }
    });
});
function finish(city){ $('done-city').textContent=city.split(',')[0]; document.body.classList.add('is-done'); window.scrollTo(0,0); }
</script>
</body>
</html>
